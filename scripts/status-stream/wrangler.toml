name = "drx4-status"
main = "src/worker.ts"
compatibility_date = "2026-04-01"

# Custom domain attached after first deploy:
#   wrangler deployments domains add status.drx4.xyz
# (or via dashboard → Workers → drx4-status → Custom Domains)

[[durable_objects.bindings]]
name = "STREAM"
class_name = "EventStream"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EventStream"]

[vars]
RING_SIZE = "500"
